name: POS E2E Test Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Test Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      test_suite:
        description: "Test Suite to Run"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - smoke
          - functional
          - negative
          - performance
          - barcode
          - payment_methods
          - receipt
          - stock_alerts
          - offline
          - multi_currency

env:
  BASE_URL: http://localhost:8069
  ADMIN_USER: admin
  ADMIN_PASSWORD: admin
  DB_NAME: pos_test
  HEADLESS: "true"
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
      - name: Lint with ruff
        run: ruff check src/ --fix --unsafe-fixes
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports || true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pos_test
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo17
        options: >-
          --health-cmd "pg_isready -U odoo -d pos_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Start Odoo
        run: |
          docker run -d --name odoo \
            -e HOST=localhost \
            -e USER=odoo \
            -e PASSWORD=odoo17 \
            -e DB_NAME=pos_test \
            -p 8069:8069 \
            -v ${{ github.workspace }}/docker/entrypoint.sh:/entrypoint-custom.sh \
            --entrypoint /bin/bash \
            odoo:17.0 /entrypoint-custom.sh
          echo "Waiting for Odoo to be ready..."
          timeout=120
          until curl -s http://localhost:8069/web/login > /dev/null 2>&1; do
            sleep 5
            timeout=$((timeout - 5))
            if [ $timeout -le 0 ]; then
              echo "Odoo failed to start"
              exit 1
            fi
          done
          echo "Odoo is ready!"

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Determine test markers
        id: test_markers
        run: |
          SUITE="${{ github.event.inputs.test_suite || 'full' }}"
          case $SUITE in
            smoke)          MARKERS="smoke" ;;
            functional)     MARKERS="functional and not performance and not negative" ;;
            negative)       MARKERS="negative" ;;
            performance)    MARKERS="performance" ;;
            barcode)        MARKERS="barcode" ;;
            payment_methods) MARKERS="payment_methods" ;;
            receipt)        MARKERS="receipt" ;;
            stock_alerts)   MARKERS="stock_alerts" ;;
            offline)        MARKERS="offline" ;;
            multi_currency) MARKERS="multi_currency" ;;
            full)           MARKERS="" ;;
            *)              MARKERS="" ;;
          esac
          echo "markers=$MARKERS" >> $GITHUB_OUTPUT

      - name: Run E2E tests
        id: run_tests
        continue-on-error: true
        run: |
          MARKERS="${{ steps.test_markers.outputs.markers }}"
          if [ -n "$MARKERS" ]; then
            pytest src/tests/ \
              -m "$MARKERS" \
              --alluredir=reports/allure-results \
              --junitxml=reports/junit/results.xml \
              -v \
              --maxfail=5 \
              --durations=10
          else
            pytest src/tests/ \
              --alluredir=reports/allure-results \
              --junitxml=reports/junit/results.xml \
              -v \
              --maxfail=10 \
              --durations=10 \
              --ignore=src/tests/performance/k6
          fi
        env:
          BASE_URL: http://localhost:8069
          HEADLESS: "true"
          SCREENSHOT_ON_FAILURE: "true"
          TRACE_ON_FAILURE: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-traces
          path: reports/traces/
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit/
          retention-days: 30

      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  k6-performance:
    name: Performance Load Test (k6)
    runs-on: ubuntu-latest
    if: github.event.inputs.test_suite == 'performance' || github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'full'
    needs: [e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: src/tests/performance/k6/pos_browse_test.js
          flags: --out json=reports/k6/performance-results.json
        env:
          BASE_URL: http://localhost:8069
      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: reports/k6/
          retention-days: 30

  allure-report:
    name: Generate Allure Dashboard
    runs-on: ubuntu-latest
    if: always()
    needs: [e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/
        continue-on-error: true
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: reports/allure-results
          allure_history: allure-history
          keep_reports: 20
      - name: Deploy Allure Report to Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          destination_dir: allure-report

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    needs: [e2e-tests, allure-report]
    steps:
      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
